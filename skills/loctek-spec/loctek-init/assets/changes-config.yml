version: 1
project: loctek
language: zh-CN
issue:
  kinds:
    - feature
    - bug
  bug_mode:
    avoid_module_optimization: true
    required_sections:
      - 现象
      - 期望行为
      - 复现信息
      - 已知事实
      - 初始假设
      - 排查计划
      - 修复边界
      - 验收标准
      - 必须保留的行为
      - 回归测试计划
intent:
  required_sections:
    - 为什么改
    - 改了什么
    - 涉及文件
    - 必须保留的行为
    - 验证方式
    - 风险点
work:
  require_report: true
  required_sections:
    - Issue
    - Understanding
    - Investigation
    - Implementation
    - Acceptance Criteria
    - Tests
    - Files Changed
    - Behavior Preserved
    - Follow-ups
merge:
  require_report_on_conflict: true
  inspect_semantic_conflicts: true
test:
  require_report: true
  commands:
    javascript:
      - npm test
      - npm run lint
      - npm run typecheck
      - npm run build
    python:
      - pytest
    go:
      - go test ./...
risk_files:
  - package.json
  - pnpm-lock.yaml
  - package-lock.json
  - yarn.lock
  - .github/**
  - db/**
  - migrations/**
  - src/routes/**
  - src/permissions/**
  - src/auth/**
  - src/payment/**
max_pr_changed_lines: 500
